<!DOCTYPE html>
<html lang="ku" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>لەبیرچوونی وشەی نهێنی - QuizApp</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="login-box material-card">


    <div class="logo-area">

        <img src="logo.png" class="logo">

    </div>


    <h1>QuizApp</h1>

    <p class="subtitle">
        وشەی نهێنیت لەبیر چوو؟
    </p>



    <input
    type="email"
    id="email"
    placeholder="ئیمەیڵی هەژمار">



    <button id="resetBtn" class="primary-btn">

        ناردنی لینک

    </button>



    <button
    onclick="location.href='index.html'"
    class="secondary-btn">

        گەڕانەوە بۆ Login

    </button>



    <p id="message"></p>


</div>




<script type="module">


import { resetPassword } from "./auth.js";



document.getElementById("resetBtn").onclick = async()=>{


let email =
document.getElementById("email").value;



if(!email){

document.getElementById("message").innerHTML =
"تکایە ئیمەیڵ بنووسە";

return;

}



try{


await resetPassword(email);



document.getElementById("message").innerHTML =
"لینکی گۆڕینی وشەی نهێنی نێردرا ✅";


}

catch(error){


document.getElementById("message").innerHTML =
error.message;


}


};


</script>


</body>

</html>
