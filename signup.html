<!DOCTYPE html>
<html lang="ku" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QuizApp - Result</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="container material-card">


<h1>🎉 ئەنجامی تاقیکردنەوە</h1>



<div class="result-score" id="scoreBox">

...

</div>



<p class="result-text" id="message">

</p>



<button 
onclick="location.href='quiz.html'"
class="primary-btn">

🔄 دووبارە یاری بکە

</button>



<button 
onclick="location.href='home.html'"
class="secondary-btn">

🏠 گەڕانەوە بۆ سەرەتا

</button>



</div>





<script>


let score =
Number(localStorage.getItem("quizScore"));



let scoreBox =
document.getElementById("scoreBox");


let message =
document.getElementById("message");



if(!isNaN(score)){



scoreBox.innerHTML =
"⭐ " + score;



if(score >= 3){


message.innerHTML =
"زۆر باشە! 👏 توانیت زۆر باش یاری بکەیت";


}
else if(score > 0){


message.innerHTML =
"باشە، بەردەوام بە و هەوڵی زیاتر بدە 💪";


}
else{


message.innerHTML =
"جارێکی تر تاقیبکەرەوە 🚀";


}



}else{


scoreBox.innerHTML =
"0";


message.innerHTML =
"هیچ ئەنجامێک نییە";


}



</script>


</body>

</html>
