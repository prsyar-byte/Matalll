<!DOCTYPE html>
<html lang="ku" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>هەواڵ - Dollar IQ</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<header class="top">

<button class="back-btn" onclick="location.href='index.html'">
<i class="fa-solid fa-arrow-right"></i>
</button>

<h2 id="newsPageTitle">هەواڵ</h2>

<div></div>

</header>

<div class="main-card">

<h3 id="newsTitle">
نوێترین هەواڵەکان
</h3>

<!-- Dollar News -->

<div class="box news-item" onclick="openNews('dollar')">

<i class="fa-solid fa-dollar-sign"></i>

<p id="newsDollar">
💵 نرخی دۆلار نوێکرایەوە
</p>

<small id="newsSmall1">
کلیک بکە بۆ زانیاری
</small>

</div>

<!-- Gold News -->

<div class="box news-item" onclick="openNews('gold')">

<i class="fa-solid fa-coins"></i>

<p id="newsGold">
🪙 نرخی زێڕ چاودێری دەکرێت
</p>

<small id="newsSmall2">
کلیک بکە بۆ زانیاری
</small>

</div>

<!-- Market News -->

<div class="box news-item" onclick="openNews('market')">

<i class="fa-solid fa-chart-line"></i>

<p id="newsMarket">
📈 گۆڕانی بازاڕی دراو
</p>

<small id="newsSmall3">
کلیک بکە بۆ زانیاری
</small>

</div>

</div>

<script src="script.js"></script>

<script>

function openNews(type){

if(type=="dollar"){

alert("💵 هەواڵی دۆلار\n\nنرخی دۆلار نوێکرایەوە.");

}

else if(type=="gold"){

alert("🪙 هەواڵی زێڕ\n\nنرخی زێڕ بەردەوام چاودێری دەکرێت.");

}

else if(type=="market"){

alert("📈 هەواڵی بازاڕ\n\nگۆڕانکاری نوێ لە بازاڕی دراو تۆمار کرا.");

}

}

</script>

</body>

</html>
