<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پانێلی ئەدمین</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',Tahoma,Arial,sans-serif;background:linear-gradient(135deg,#1a0a0a,#2d1b1b,#1a0a0a);min-height:100vh;padding:15px;color:#fff}
        .container{max-width:950px;margin:0 auto}
        .hidden{display:none!important}
        .card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:30px;backdrop-filter:blur(10px);margin-bottom:20px}
        .btn{padding:12px 25px;border:none;border-radius:10px;font-size:1em;cursor:pointer;font-weight:bold;transition:all .3s}
        .btn:hover{transform:scale(1.03)}
        .btn-primary{background:linear-gradient(45deg,#e94560,#f5a623);color:#fff}
        .btn-success{background:linear-gradient(45deg,#4ecdc4,#44bd63);color:#fff}
        .btn-danger{background:rgba(233,69,96,.2);color:#e94560;border:1px solid #e94560}
        .btn-danger:hover{background:#e94560;color:#fff}
        .btn-small{padding:8px 15px;font-size:.85em}
        .btn-full{width:100%}
        .form-group{margin-bottom:18px;text-align:right}
        .form-group label{display:block;margin-bottom:8px;color:#ccc;font-size:.9em}
        .form-group input,.form-group textarea{width:100%;padding:13px 16px;border:1px solid rgba(255,255,255,.2);border-radius:12px;background:rgba(255,255,255,.05);color:#fff;font-size:1em}
        .form-group input:focus,.form-group textarea:focus{outline:none;border-color:#f5a623}

        .login-page{display:flex;justify-content:center;align-items:center;min-height:90vh}
        .login-box{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.15);border-radius:25px;padding:50px 40px;width:100%;max-width:400px;text-align:center}
        .login-box h1{font-size:1.8em;margin-bottom:10px;color:#e94560}
        .login-box p{color:#aaa;margin-bottom:25px}
        .error-msg{color:#e94560;font-size:.85em;margin-top:10px;display:none}

        .app-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:15px;margin-bottom:25px;padding:20px 0}
        .app-header h1{font-size:1.8em;color:#e94560}

        .nav{display:flex;gap:10px;margin-bottom:25px;flex-wrap:wrap}
        .nav button{padding:10px 20px;border:1px solid rgba(255,255,255,.2);border-radius:10px;background:transparent;color:#ccc;cursor:pointer;transition:all .3s}
        .nav button.active{background:rgba(233,69,96,.2);color:#e94560;border-color:#e94560}

        .user-row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;padding:15px;border:1px solid rgba(255,255,255,.1);border-radius:12px;margin-bottom:10px;background:rgba(255,255,255,.03)}
        .user-row .info{flex:1}
        .user-row .info h4{color:#fff;margin-bottom:3px}
        .user-row .info p{color:#888;font-size:.85em}
        .badge{padding:4px 12px;border-radius:20px;font-size:.8em;font-weight:bold}
        .badge-on{background:rgba(78,205,196,.2);color:#4ecdc4}
        .badge-off{background:rgba(233,69,96,.2);color:#e94560}
        .u-actions{display:flex;gap:8px;flex-wrap:wrap}

        .msg-item{padding:15px;border:1px solid rgba(255,255,255,.1);border-radius:12px;margin-bottom:10px;background:rgba(255,255,255,.03)}
        .msg-item .mt{color:#fff;margin-bottom:5px}
        .msg-item .md{color:#888;font-size:.8em}

        .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:15px;margin-bottom:25px}
        .stat{background:rgba(255,255,255,.05);border-radius:12px;padding:20px;text-align:center}
        .stat .num{font-size:2em;font-weight:bold;color:#f5a623}
        .stat .lbl{color:#aaa;font-size:.85em;margin-top:5px}

        .empty{text-align:center;padding:40px;color:#666}
        .empty span{font-size:3em;display:block;margin-bottom:10px}

        @media(max-width:600px){.user-row{flex-direction:column;text-align:center}.u-actions{justify-content:center}.stats{grid-template-columns:1fr 1fr}}
    </style>
</head>
<body>

<!-- ADMIN LOGIN -->
<div class="login-page" id="aLogin">
    <div class="login-box">
        <h1>🔧 پانێلی ئەدمین</h1>
        <p>تەنها بۆ بەڕێوەبەر</p>
        <div class="form-group">
            <label>🔑 وشەی نهێنی</label>
            <input type="password" id="aPass" placeholder="وشەی نهێنی..." onkeypress="if(event.key==='Enter')aLogin()">
        </div>
        <button class="btn btn-primary btn-full" onclick="aLogin()">🔧 چوونەژوورەوە</button>
        <p class="error-msg" id="aErr"></p>
    </div>
</div>

<!-- ADMIN PANEL -->
<div class="container hidden" id="aPanel">
    <div class="app-header">
        <h1>🔧 پانێلی ئەدمین</h1>
        <button class="btn btn-danger btn-small" onclick="aLogout()">🚪 دەرچوون</button>
    </div>

    <!-- Stats -->
    <div class="stats">
        <div class="stat"><div class="num" id="stTotal">0</div><div class="lbl">کۆی بەکارهێنەران</div></div>
        <div class="stat"><div class="num" id="stActive">0</div><div class="lbl">چالاک</div></div>
        <div class="stat"><div class="num" id="stInactive">0</div><div class="lbl">ناچالاک</div></div>
    </div>

    <div class="nav">
        <button class="active" onclick="aTab('users')">👥 بەکارهێنەران</button>
        <button onclick="aTab('msgs')">📢 نامەکان</button>
    </div>

    <!-- Users -->
    <div id="secUsers">
        <div class="card">
            <h2 style="color:#f5a623;margin-bottom:20px">👥 بەڕێوەبردنی بەکارهێنەران</h2>
            <div id="uList"></div>
            <div class="empty hidden" id="noU"><span>👤</span><p>هیچ بەکارهێنەرێک نییە</p></div>
        </div>
    </div>

    <!-- Messages -->
    <div id="secMsgs" class="hidden">
        <div class="card">
            <h2 style="color:#4ecdc4;margin-bottom:20px">📢 ناردنی نامە بۆ هەمووان</h2>
            <div class="form-group">
                <label>دەقی نامە</label>
                <textarea id="msgIn" rows="4" placeholder="نامەکەت بنووسە..."></textarea>
            </div>
            <button class="btn btn-success btn-full" onclick="sendMsg()">📤 ناردن</button>
        </div>
        <div class="card">
            <h2 style="color:#f5a623;margin-bottom:20px">📋 نامە نێردراوەکان</h2>
            <div id="mList"></div>
            <div class="empty hidden" id="noM"><span>📭</span><p>هیچ نامەیەک نییە</p></div>
        </div>
    </div>
</div>

<script>
const PASS='admin2026';

function getUsers(){return JSON.parse(localStorage.getItem('dq_users')||'[]')}
function saveUsers(u){localStorage.setItem('dq_users',JSON.stringify(u))}
function getRecs(e){return JSON.parse(localStorage.getItem('dq_rec_'+e)||'[]')}
function getMsgs(){return JSON.parse(localStorage.getItem('dq_msgs')||'[]')}
function saveMsgs(m){localStorage.setItem('dq_msgs',JSON.stringify(m))}

function aLogin(){
    const p=document.getElementById('aPass').value;
    if(p!==PASS){document.getElementById('aErr').textContent='⚠️ وشەی نهێنی هەڵەیە!';document.getElementById('aErr').style.display='block';return}
    document.getElementById('aLogin').classList.add('hidden');
    document.getElementById('aPanel').classList.remove('hidden');
    refresh();
}

function aLogout(){
    document.getElementById('aPanel').classList.add('hidden');
    document.getElementById('aLogin').classList.remove('hidden');
    document.getElementById('aPass').value='';
}

function aTab(t){
    document.querySelectorAll('.nav button').forEach((b,i)=>{
        b.classList.toggle('active',(t==='users'&&i===0)||(t==='msgs'&&i===1));
    });
    document.getElementById('secUsers').classList.toggle('hidden',t!=='users');
    document.getElementById('secMsgs').classList.toggle('hidden',t!=='msgs');
}

function refresh(){
    renderUsers();
    renderMsgs();
    updateStats();
}

function updateStats(){
    const users=getUsers();
    const now=new Date();
    const active=users.filter(u=>u.active&&u.subEnd&&new Date(u.subEnd)>now).length;
    document.getElementById('stTotal').textContent=users.length;
    document.getElementById('stActive').textContent=active;
    document.getElementById('stInactive').textContent=users.length-active;
}

function renderUsers(){
    const users=getUsers();
    const list=document.getElementById('uList');
    const noU=document.getElementById('noU');
    if(!users.length){list.innerHTML='';noU.classList.remove('hidden');return}
    noU.classList.add('hidden');
    const now=new Date();

    list.innerHTML=users.map(u=>{
        const isOn=u.active&&u.subEnd&&new Date(u.subEnd)>now;
        const days=isOn?Math.ceil((new Date(u.subEnd)-now)/(1000*60*60*24)):0;
        const recs=getRecs(u.email);
        return '<div class="user-row"><div class="info"><h4>👤 '+u.name+'</h4><p>📧 '+u.email+' | 📝 '+recs.length+' تۆمار | 📅 '+new Date(u.joined).toLocaleDateString('ku')+'</p>'+(isOn?'<p style="color:#4ecdc4">⏰ '+days+' ڕۆژی ماوە</p>':'')+'</div><span class="badge '+(isOn?'badge-on':'badge-off')+'">'+(isOn?'✅ چالاک':'❌ ناچالاک')+'</span><div class="u-actions"><button class="btn btn-success btn-small" onclick="activate(\''+u.email+'\')">✅ چالاک ٣٦٥</button><button class="btn btn-danger btn-small" onclick="deactivate(\''+u.email+'\')">🚫 ناچالاک</button><button class="btn btn-danger btn-small" onclick="delUser(\''+u.email+'\')">🗑️ سڕینەوە</button></div></div>';
    }).join('');
}

function activate(email){
    let users=getUsers();
    const u=users.find(x=>x.email===email);
    if(u){
        const now=new Date();
        const end=new Date();
        end.setDate(end.getDate()+365);
        u.active=true;
        u.subStart=now.toISOString();
        u.subEnd=end.toISOString();
        saveUsers(users);
        refresh();
        alert('✅ '+u.name+' چالاککرا بۆ ٣٦٥ ڕۆژ!');
    }
}

function deactivate(email){
    if(!confirm('ناچالاککردن؟'))return;
    let users=getUsers();
    const u=users.find(x=>x.email===email);
    if(u){u.active=false;saveUsers(users);refresh()}
}

function delUser(email){
    if(!confirm('سڕینەوەی بەکارهێنەر و هەموو داتاکانی؟'))return;
    saveUsers(getUsers().filter(u=>u.email!==email));
    localStorage.removeItem('dq_rec_'+email);
    refresh();
}

function sendMsg(){
    const t=document.getElementById('msgIn').value.trim();
    if(!t){alert('⚠️ نامە بنووسە!');return}
    let msgs=getMsgs();
    msgs.unshift({id:Date.now(),text:t,date:new Date().toISOString()});
    saveMsgs(msgs);
    document.getElementById('msgIn').value='';
    renderMsgs();
    alert('✅ نامە نێردرا بۆ هەموو بەکارهێنەران!');
}

function renderMsgs(){
    const msgs=getMsgs();
    const list=document.getElementById('mList');
    const noM=document.getElementById('noM');
    if(!msgs.length){list.innerHTML='';noM.classList.remove('hidden');return}
    noM.classList.add('hidden');
    list.innerHTML=msgs.map(m=>'<div class="msg-item"><div class="mt">📢 '+m.text+'</div><div class="md">'+new Date(m.date).toLocaleString('ku')+' <button class="btn btn-danger btn-small" style="margin-right:10px" onclick="delMsg('+m.id+')">🗑️</button></div></div>').join('');
}

function delMsg(id){
    saveMsgs(getMsgs().filter(m=>m.id!==id));
    renderMsgs();
}

// Auto refresh
setInterval(refresh,10000);
</script>
</body>
</html>
