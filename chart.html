<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>گرافی نرخی دۆلار</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

</head>

<body>

<header class="top">

<button onclick="history.back()">←</button>

<h2>📈 گرافی نرخی دۆلار</h2>

<div></div>

</header>


<div class="main-card">

<h3>جوڵەی نرخی 100 دۆلار</h3>

<div class="chart-box">
    <canvas id="rateChart"></canvas>
</div>

</div>


<script>

const canvas = document.getElementById("rateChart");
const ctx = canvas.getContext("2d");


let values = [
152900,
153100,
152800,
153250,
153000,
152950,
153200
];


let labels = [
"شەممە",
"یەکشەممە",
"دووشەممە",
"سێشەممە",
"چوارشەممە",
"پێنجشەممە",
"هەینی"
];


const chart = new Chart(ctx, {

type: "line",

data: {

labels: labels,

datasets: [{

label: "100 دۆلار (د.ع)",

data: values,

borderWidth: 3,

tension: 0.4,

fill: true

}]

},


options: {

responsive: true,

maintainAspectRatio: false,


plugins: {

legend: {

display: true

}

},


scales: {

y: {

beginAtZero: false

}

}

}

});


// جوڵانی گراف

setInterval(function(){

let last = values[values.length - 1];

let change = Math.floor(Math.random() * 200 - 100);

values.push(last + change);


let now = new Date();

labels.push(
now.getHours() + ":" + now.getMinutes()
);


if(values.length > 10){

values.shift();
labels.shift();

}


chart.update();


},5000);


</script>


</body>
</html>
