<!DOCTYPE html>
<html lang="ku" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QuizApp - Quiz</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="container material-card">


<h1>🧩 یاری QuizApp</h1>


<p id="timer">
⏱️ 30
</p>


<h2 id="question">
چاوەڕێ بکە...
</h2>


<div id="answers"></div>


<p id="score">
⭐ نمرە: 0
</p>


<p id="message"></p>


</div>




<script type="module">


import { db, auth } from "./firebase.js";


import {

collection,
getDocs,
addDoc

} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";





let questions = [];

let current = 0;

let score = 0;

let answered = false;

let time = 30;

let timer;





const questionBox =
document.getElementById("question");


const answersBox =
document.getElementById("answers");


const scoreBox =
document.getElementById("score");


const timerBox =
document.getElementById("timer");


const message =
document.getElementById("message");






async function getQuestions(){


const snap =
await getDocs(collection(db,"questions"));



questions = [];



snap.forEach((doc)=>{

questions.push(doc.data());

});



if(questions.length === 0){

questionBox.innerHTML =
"هیچ پرسیارێک نییە";

return;

}



showQuestion();


}






function startTimer(){


clearInterval(timer);


time = 30;



timer=setInterval(()=>{


time--;


timerBox.innerHTML =
"⏱️ " + time;



if(time <= 0){


clearInterval(timer);

nextQuestion();


}


},1000);


}







function showQuestion(){


answered=false;


message.innerHTML="";


answersBox.innerHTML="";



let q =
questions[current];



questionBox.innerHTML =
(current+1)+" - "+q.question;



q.answers.forEach((answer,index)=>{


let btn =
document.createElement("button");



btn.innerHTML =
answer;



btn.onclick=()=>{


if(answered) return;



answered=true;



clearInterval(timer);



if(index === q.correct){


score++;


scoreBox.innerHTML =
"⭐ نمرە: "+score;


message.innerHTML =
"✅ وەڵامی ڕاستە";


}else{


message.innerHTML =
"❌ وەڵامی هەڵەیە";


}



setTimeout(()=>{

nextQuestion();

},800);



};



answersBox.appendChild(btn);



});



startTimer();


}







function nextQuestion(){


current++;



if(current < questions.length){


showQuestion();


}else{


finishGame();


}


}







async function finishGame(){


clearInterval(timer);



let user =
auth.currentUser;



await addDoc(
collection(db,"scores"),
{


name:user ? user.email : "Guest",

email:user ? user.email : "",

score:score,

date:new Date()


}
);



localStorage.setItem(
"quizScore",
score
);



location.href="result.html";


}






getQuestions();



</script>


</body>

</html>
