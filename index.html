<!DOCTYPE html>
<html lang="ku" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DZhaaa</title>

<link rel="stylesheet" href="style.css">

</head>

<div id="loginPage" class="login-page">

<h2>🔐 DZhaaa</h2>

<input id="usernameInput" placeholder="ناوی بەکارهێنەر">

<input id="passwordInput" type="password" placeholder="وشەی نهێنی">

<button id="loginBtn" class="setting-btn">
چوونەژوورەوە
</button>

<button id="signupBtn" class="setting-btn">
دروستکردنی هەژمار
</button>

</div>

<body>


<header class="topbar">

<div class="icon" id="settingsBtn">⚙️</div>

<div class="logo">
<span>DZhaaa</span>
</div>

<div class="right-icons">

<div class="icon notification">
🔔
<span class="badge">3</span>
</div>

<div class="icon">
👤
</div>

</div>

</header>



<!-- Settings -->

<div id="settingsPage" class="page" style="display:none;">

<h2>⚙️ ڕێکخستن</h2>

<button class="setting-btn" id="darkModeBtn">
🌙 دۆخی شەو
</button>

<button class="setting-btn" id="languageBtn">
🌐 گۆڕینی زمان
</button>

<button class="setting-btn" id="notifyBtn">
🔔 ئاگادارکردنەوە
</button>

<button class="setting-btn" id="soundBtn">
🔊 دەنگ
</button>

<button class="setting-btn">
ℹ️ دەربارەی DZhaaa
</button>

</div>




<!-- Games -->

<div class="tabs">

<button class="active">هەموو</button>

<button>ئۆنلاین</button>

<button>هاوڕێیان</button>

</div>



<div class="search-box">

<input id="search" placeholder="گەڕان بۆ یاری...">

</div>



<div class="games">


<div class="card">
<span class="heart">♡</span>
<img src="https://picsum.photos/400/500?1">
<h3>PUBG Mobile</h3>
</div>


<div class="card">
<span class="heart">♡</span>
<img src="https://picsum.photos/400/500?2">
<h3>FC Mobile</h3>
</div>


<div class="card">
<span class="heart">♡</span>
<img src="https://picsum.photos/400/500?3">
<h3>Minecraft</h3>
</div>


<div class="card">
<span class="heart">♡</span>
<img src="https://picsum.photos/400/500?4">
<h3>Car Parking</h3>
</div>


</div>





<!-- Chat -->

<div id="chatPage" class="page" style="display:none;">

<h2>💬 چات</h2>


<div class="chat-box" id="chatBox">

</div>


<div class="chat-input">

<input id="messageInput" placeholder="نامە بنووسە...">

<button id="sendBtn">
ناردن
</button>

</div>


</div>





<!-- Profile -->

<div id="profilePage" class="page" style="display:none;">

<h2>👤 هەژمار</h2>


<div class="profile">

<div class="avatar">
<img id="profileImage" src="" alt="Profile">
</div>

<input type="file" id="imageInput" accept="image/*" hidden>

<button class="setting-btn" id="changeImageBtn">
🖼️ گۆڕینی وێنە
</button>


<h3>بەکارهێنەر</h3>


<p>🎮 یاری دڵخواز: 0</p>

<p>⭐ خاڵ: 0</p>
  
<p>🏆 بردنەوە: <span id="wins">0</span></p>
  

<p>⭐ خاڵ: <span id="score">0</span></p>

<p>❤️ یاری دڵخواز: <span id="favCount">0</span></p>

<div id="favGames"></div>
  
  <h3>👥 هاوڕێکان</h3>

<input id="friendInput" placeholder="ناوی هاوڕێ بنووسە">

<button id="addFriendBtn" class="setting-btn">
➕ زیادکردنی هاوڕێ
</button>

<div id="friendList"></div>
  
  <div id="privateChat" style="display:none;">

<h3>💬 چاتی هاوڕێ</h3>

<h4 id="chatFriendName"></h4>

<div class="chat-box" id="privateChatBox">
</div>

<div class="chat-input">

<input id="privateMessageInput" placeholder="نامە بنووسە...">

<button id="privateSendBtn">
ناردن
</button>

</div>

</div>
  
<button id="editProfileBtn" class="setting-btn">
✏️ گۆڕینی ناو
</button>


</div>


</div>



<!-- Bottom Menu -->

<div class="bottom-nav">


<div class="nav-item active">
🏠
<br>
سەرەکی
</div>


<div class="nav-item">
🎮
<br>
یاری
</div>


<div class="nav-item">
💬
<br>
چات
</div>


<div class="nav-item">
👤
<br>
هەژمار
</div>


</div>



<script src="script.js"></script>


</body>

</html>
