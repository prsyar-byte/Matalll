<!DOCTYPE html>
<html lang="ku" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>QuizApp - Leaderboard</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="container material-card">


<h1>🏆 باشترین یاریزانەکان</h1>


<table class="table">

<thead>

<tr>

<th>پۆل</th>

<th>ناو</th>

<th>نمرە</th>

</tr>

</thead>


<tbody id="leaderboard">

<tr>

<td colspan="3">
چاوەڕێ بکە...
</td>

</tr>

</tbody>


</table>



<button 
onclick="location.href='home.html'"
class="secondary-btn">

🏠 گەڕانەوە بۆ سەرەتا

</button>


</div>





<script type="module">


import { db } from "./firebase.js";


import {

collection,

getDocs,

query,

orderBy,

limit

} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";



const board =
document.getElementById("leaderboard");



async function loadLeaderboard(){


try{


const q = query(

collection(db,"scores"),

orderBy("score","desc"),

limit(10)

);



const snapshot =
await getDocs(q);



board.innerHTML="";



let rank=1;



snapshot.forEach((doc)=>{


const data = doc.data();



board.innerHTML += `


<tr>

<td>${rank}</td>

<td>${data.name}</td>

<td>${data.score}</td>

</tr>


`;



rank++;


});



if(rank===1){


board.innerHTML = `

<tr>

<td colspan="3">

هیچ نمرەیەک نییە

</td>

</tr>

`;

}



}

catch(error){


board.innerHTML = `

<tr>

<td colspan="3">

هەڵە لە هێنانی زانیاری

</td>

</tr>

`;


console.log(error);


}



}



loadLeaderboard();



</script>


</body>

</html>
