<!DOCTYPE html>
<html lang="ku" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🧮 iPhone Calculator</title>

<link rel="stylesheet" href="calculator.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="calculator">

<div class="screen">

<input
type="text"
id="display"
class="display"
value="0"
readonly>
<div id="history" class="history"></div>
</div>

<div class="buttons">

<button class="btn gray" onclick="clearDisplay()">AC</button>

<button class="btn gray" onclick="plusMinus()">±</button>

<button class="btn gray" onclick="percent()">%</button>

<button class="btn orange" onclick="operator('÷')">÷</button>

<button class="btn dark" onclick="press('7')">7</button>

<button class="btn dark" onclick="press('8')">8</button>

<button class="btn dark" onclick="press('9')">9</button>

<button class="btn orange" onclick="operator('×')">×</button>

<button class="btn dark" onclick="press('4')">4</button>

<button class="btn dark" onclick="press('5')">5</button>

<button class="btn dark" onclick="press('6')">6</button>

<button class="btn orange" onclick="operator('-')">−</button>
  <button class="btn dark" onclick="press('1')">1</button>

<button class="btn dark" onclick="press('2')">2</button>

<button class="btn dark" onclick="press('3')">3</button>

<button class="btn orange" onclick="operator('+')">+</button>

<button class="btn dark zero" onclick="press('0')">0</button>

<button class="btn dark" onclick="dot()">.</button>

<button class="btn orange" onclick="calculate()">=</button>
  
<button class="btn gray" onclick="backspace()">⌫</button>
  
</div>

</div>

<script src="calculator.js"></script>

  <button class="back-btn" onclick="location.href='index.html'">
← گەڕانەوە
</button>
</body>
</html>
